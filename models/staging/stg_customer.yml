version: 2

# ============================================================
# STAGING LAYER — CUSTOMER TABLE
# ============================================================
# Source     : cbs.customer  (raw PostgreSQL / CBS)
# Raw table  : tbaadm.customer
# Strategy   : Full table (materialized as table)
# Schema     : silver_cbs
# Owner      : Data Engineering Team
# ============================================================

models:

  - name: stg_customer
    description: >
      Staging model for the customer master data sourced from the Core Banking System (CBS).
      Each row represents one unique customer of the bank, identified by cif_id (Customer
      Information File ID). This model performs a light clean-select from the raw CBS customer
      table — no transformations or derivations are applied at this layer.
      Downstream models such as dim_customers consume this model for the gold layer.
      Approximately 80% of customers are Nepali nationals; the remaining 20% are foreign nationals.
      This table contains PII — handle with care and restrict access appropriately.

    meta:
      owner: data_engineering
      source_system: CBS (Core Banking System)
      update_frequency: daily
      pii: true
      pii_columns: [name, email, phone_number, father_name, mother_name, address]

    columns:

      - name: cif_id
        description: >
          Customer ID (Customer Information File ID) — the primary key and unique identifier
          for each customer in the banking system. Generated by the CBS.
          Format is alphanumeric (e.g. C0001, K93591611).
          Used as a foreign key in stg_account, dim_customers, and transaction tables
          to link all financial activity back to a customer.
        tests:
          - unique
          - not_null

      - name: name
        description: >
          Full legal name of the customer as registered in the Core Banking System during
          account opening KYC (Know Your Customer). May contain trimming inconsistencies
          from the raw source.
          PII — handle with care.
        tests:
          - not_null

      - name: address
        description: >
          Residential or mailing address of the customer as provided during KYC.
          Free-text field — may contain house number, street name, city, or district.
          PII — handle with care.

      - name: phone_number
        description: >
          Primary contact phone number of the customer.
          Typically a 10-digit Nepali mobile number (e.g. 9801234567) or
          international format for foreign nationals.
          PII — handle with care.

      - name: postal_code
        description: >
          Postal code of the customer's registered address.
          5-digit numeric code corresponding to Nepal postal zones.

      - name: country
        description: >
          Country of residence of the customer as registered during KYC.
          Most records show 'Nepal' for Nepali customers.

      - name: email
        description: >
          Primary email address of the customer as provided during KYC.
          PII — handle with care. Expected to be unique per customer.
        tests:
          - unique

      - name: father_name
        description: >
          Father's full name of the customer. A mandatory KYC field under
          Nepali banking regulations for customer identification and verification.
          PII — handle with care.

      - name: mother_name
        description: >
          Mother's full name of the customer. A mandatory KYC field under
          Nepali banking regulations for customer identification and verification.
          PII — handle with care.

      - name: occupation
        description: >
          Current occupation or profession of the customer as declared during KYC.
          Example values: Teacher, Software Engineer, Government Officer, Nurse,
          Professor, Army Officer, Accountant, Police Officer.
          Used downstream for customer risk profiling and segmentation.

      - name: education
        description: >
          Highest education level attained by the customer as declared during KYC.
          Raw values from CBS: SLC, +2, Diploma, Bachelor's, Master's, PhD, Primary.
          No transformation is applied at the staging layer — downstream models
          (e.g. silver layer) derive education buckets from this raw field.

      - name: nationality
        description: >
          Nationality of the customer as declared during KYC account opening.
          Most common values: Nepali, Indian, Chinese, British, American.
          Approximately 80% of customers are Nepali nationals.
          Used downstream for customer segmentation and regulatory reporting.
        tests:
          - not_null
