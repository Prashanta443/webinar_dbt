version: 2

# ============================================================
# STAGING LAYER — HISTORICAL TRANSACTION TABLE
# ============================================================
# Source     : cbs.hist_transactional  (raw PostgreSQL / CBS)
# Raw table  : tbaadm.hist_transactional
# Strategy   : Incremental APPEND on tran_date high-watermark
# Schema     : silver_cbs
# Owner      : Data Engineering Team
# ============================================================

models:
  - name: stg_hist_transactional
    description: >
      Staging model for historical banking transaction records sourced from the
      Core Banking System (CBS). Each row represents one financial transaction
      (debit or credit) performed on a bank account either at a branch counter
      (IN_BRANCH) or through a digital channel (DIGITAL) such as mobile banking,
      internet banking, ATM, eSewa, Fonepay, ConnectIPS etc.

      This model uses APPEND-ONLY incremental strategy because transactions are
      immutable financial records — once written they are never updated or deleted.
      Only new transactions where tran_date is greater than the current high-watermark
      (max tran_date already loaded) are appended on each dbt run.

      No transformations or derivations are applied at this staging layer — the model
      is a clean select from the raw CBS source. Downstream silver/gold models derive
      enriched columns such as year, month, channel flags, and customer attributes.

    config:
      materialized: incremental
      incremental_strategy: append
      tags: [staging, transactions, finance]

    meta:
      owner: data_engineering
      source_system: CBS (Core Banking System)
      update_frequency: daily
      grain: one row per transaction
      row_count_approx: 3000
      date_range: "2020-01-01 to 2026-04-30"
      incremental_watermark: tran_date

    columns:
      - name: tran_id
        description: >
          Primary key. Unique identifier for each transaction generated by the CBS
          transaction engine. Format: TXN followed by 6 digits (e.g. TXN000001, TXN002500).
          Never reused or updated — this is a permanent transaction reference number.
          Used as the primary key in downstream fact tables.
        tests:
          - unique
          - not_null

      - name: foracid
        description: >
          Account number — foreign key to stg_account (foracid).
          Identifies which bank account this transaction belongs to.
          Links this transaction to the account holder (cif_id) via stg_account.
          One account can have many transactions over its lifetime.
        tests:
          - not_null
          - relationships:
              to: ref('stg_account')
              field: foracid

      - name: tran_amount
        description: >
          Monetary value of the transaction in the transaction currency (tran_crncy).
          Always a positive value — direction (debit or credit) is not stored in this table.
          Range in dataset: from small amounts (~100) up to large amounts (~500,000).
          All downstream balance calculations must reference tran_particular
          to determine if this was a debit or credit.
        tests:
          - not_null

      - name: tran_date
        description: >
          Calendar date on which the transaction was performed. Stored as DATE type
          (no time component).
          This is the high-watermark column for the incremental APPEND load —
          each dbt run loads only transactions where tran_date > max(tran_date)
          already present in the table.
          Date range: 2020-01-01 to 2026-04-30.
        tests:
          - not_null

      - name: tran_crncy
        description: >
          ISO 4217 currency code of the transaction amount.
          Must match the acct_crncy_code of the linked account in stg_account.
          Approximately 77% of transactions are in NPR (Nepalese Rupee).
          Possible values:
            - 'NPR' → Nepalese Rupee
            - 'USD' → US Dollar
            - 'EUR' → Euro
            - 'GBP' → British Pound Sterling
            - 'INR' → Indian Rupee
            - 'AED' → UAE Dirham
            - 'AUD' → Australian Dollar
            - 'SGD' → Singapore Dollar
        tests:
          - not_null
          - accepted_values:
              values: ["NPR", "USD", "EUR", "GBP", "INR", "AED", "AUD", "SGD"]

      - name: branch_id
        description: >
          Branch ID — identifies the bank branch associated with this transaction.
          For IN_BRANCH transactions this is the branch where the customer physically
          performed the transaction. For DIGITAL transactions this is typically the
          account's home branch.
          Links to the branch dimension for branch-level reporting and segmentation.
        tests:
          - not_null

      - name: tran_particular
        description: >
          Transaction channel — indicates how the transaction was performed.
          Possible values:
            - 'IN_BRANCH' → Customer visited a physical branch (cash deposit, cash
                            withdrawal, cheque deposit, DD payment, loan EMI, etc).
            - 'DIGITAL'   → Transaction performed through a digital channel (mobile
                            banking, internet banking, ATM, eSewa, Fonepay, ConnectIPS,
                            QR payment, POS terminal, online bill payment, etc).
          Distribution: approximately 39% IN_BRANCH and 61% DIGITAL.
        tests:
          - not_null
          - accepted_values:
              values: ["IN_BRANCH", "DIGITAL"]

      - name: tran_remarks
        description: >
          Free-text description of the transaction purpose or channel detail as
          recorded in the CBS. Examples: 'Cash deposit at branch counter',
          'Mobile banking transfer', 'eSewa payment', 'Salary credit',
          'ConnectIPS transfer'. Can be null in some CBS records.
